# PickPlace evaluation config — unseen container (uc) setting.
# Same object set as `so`; only the second placeable container changes from bowl to mug.
# See so.yaml for the field schema.

pickable_objs:
  - Can7up01
  - CanCoke01
  - CanPepsi02
  - CanPepsi01
  - Banana
  - PowerDrill
  - WoodenBlock
  - Clamp
  - BlueBlock
  - GreenBlock
  - RedBlock
  - YellowBlock
  - Apple
  - Pear
  - Orange
  - WhiteCup
  - ToyAirplane
  - ToothPaste
  - Zebra
  - Rhinocero
  - YellowDrink
  - DarlieBox
  - Soap
  - Toy01
  - Toy02

non_target_objs: [banana, powerdrill, clamp, darliebox, toyairplane]

conflicts:
  Can7up01:    [GreenBlock]
  CanCoke01:   [RedBlock]
  CanPepsi01:  [BlueBlock]
  WoodenBlock: [BlueBlock, GreenBlock, RedBlock, YellowBlock]
  BlueBlock:   [WoodenBlock, CanPepsi01]
  GreenBlock:  [WoodenBlock, Can7up01]
  RedBlock:    [WoodenBlock, CanCoke01, Apple]
  YellowBlock: [WoodenBlock]
  Apple:       [RedBlock]
  WhiteCup:    [Toy01, Toy02]
  ToothPaste:  [DarlieBox]
  DarlieBox:   [ToothPaste]
  Toy01:       [Toy02]
  Toy02:       [Toy01]

prompts:
  Can7up01:    ["green can", "green bottle", "green soda"]
  CanCoke01:   ["red can", "red bottle", "red soda", "red Coca Cola"]
  CanPepsi01:  ["blue can", "blue bottle", "blue soda", "blue Pepsi"]
  CanPepsi02:  ["black can", "black bottle", "black soda", "black Pepsi"]
  Banana:      ["banana", "yellow banana"]
  PowerDrill:  ["power drill", "electric drill"]
  WoodenBlock: ["rectangular block", "wooden block"]
  Clamp:       ["clamp", "large clamp"]
  BlueBlock:   ["blue block", "blue cube"]
  GreenBlock:  ["green block", "green cube"]
  RedBlock:    ["red block", "red cube"]
  YellowBlock: ["yellow block", "yellow cube"]
  Apple:       ["apple", "red apple"]
  Pear:        ["pear", "green pear"]
  Orange:      ["orange"]
  WhiteCup:    ["white cup"]
  ToyAirplane: ["toy airplane"]
  ToothPaste:  ["toothpaste"]
  Zebra:       ["zebra", "zebra animal"]
  Rhinocero:   ["rhinocero", "rhinocero animal"]
  YellowDrink: ["yellow drink", "yellow bottle"]
  DarlieBox:   ["darlie box"]
  Soap:        ["soap"]
  Toy01:       ["toy"]
  Toy02:       ["toy"]

placeable:
  - name: target_plate
    language: plate
    usd: assets/mesh/wooden_plate/model.usd
    scale: [2, 2, 2]
    extra_rotation_x_deg: 0
  - name: target_mug
    language: mug
    usd: assets/mesh/Axis_Aligned/025_mug.usd
    scale: [1.5, 1.0, 1.5]
    # Kept for parity with `so`: rotates the second placeable -90° about X
    # after the random Z-yaw. Preserves the same per-frame pose distribution.
    extra_rotation_x_deg: -90

scene:
  place_radius: 0.15

episodes:
  total: 58
  exclude: [10, 14, 21, 28, 30, 34, 37, 46]

policy_set_config: null
support_env_randomization: false
