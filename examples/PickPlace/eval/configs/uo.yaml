# PickPlace evaluation config — unseen object (uo) setting.
# Also serves the uoue split: run with --novel_bg --random_env --seed N (see eval_all.sh).
# See so.yaml for the field schema.

pickable_objs:
  - CanTomatoSoup
  - CanFanta01
  - CanPepsi02a
  - CanSprite01
  - BlueBall
  - Toy05
  - Camel
  - Elephant
  - Toy03
  - Toy04

non_target_objs: [toy05, camel]

conflicts:
  Camel:    [Elephant]
  Elephant: [Camel]
  Toy03:    [Toy04]
  Toy04:    [Toy03]

prompts:
  CanTomatoSoup: ["red can", "tomato soup can", "tomato soup bottle", "tomato soup"]
  CanFanta01:    ["orange can", "orange bottle", "orange soda", "orange Fanta"]
  CanPepsi02a:   ["blue can", "blue bottle", "blue soda", "blue Pepsi"]
  CanSprite01:   ["green can", "green bottle", "green soda", "green Sprite"]
  BlueBall:      ["ball", "blue ball", "round ball"]
  Toy05:         ["orange toy"]
  Camel:         ["camel", "camel animal"]
  Elephant:      ["elephant", "elephant animal"]
  Toy03:         ["toy"]
  Toy04:         ["toy"]

placeable:
  - name: target_plate
    language: plate
    usd: assets/mesh/wooden_plate/model.usd
    scale: [2, 2, 2]
    extra_rotation_x_deg: 0
  - name: target_bowl
    language: bowl
    usd: assets/mesh/Axis_Aligned/024_bowl.usd
    scale: [1, 1, 1]
    extra_rotation_x_deg: 0   # uo does NOT pre-rotate the bowl (matches original eval_uo)

scene:
  place_radius: 0.14

episodes:
  total: 67
  exclude: [1, 6, 9, 13, 20, 22, 23, 24, 38, 39, 42, 43, 44, 48, 56, 60, 64]

policy_set_config: null
support_env_randomization: true

# Used when --novel_bg is passed. Episode index range becomes
# range(seed + 10, seed + 20); both `episodes.exclude` and `novel_bg.exclude`
# combination indices are skipped.
novel_bg:
  exclude: [58, 68]
